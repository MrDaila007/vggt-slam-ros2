name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Style ──────────────────────────────────────────────────────────────────
  flake8:
    name: flake8 style check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install flake8
      - run: |
          flake8 vggt_slam_ros2/ scripts/ test/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__

  # ── Types ──────────────────────────────────────────────────────────────────
  mypy:
    name: mypy type check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install mypy numpy
      - run: |
          mypy vggt_slam_ros2/core/ \
            --ignore-missing-imports \
            --strict-optional \
            --no-error-summary

  # ── Unit tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: unit tests (no GPU)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install \
            numpy \
            opencv-python-headless \
            Pillow \
            pytest \
            pytest-cov
      - name: Run unit tests
        run: |
          python -m pytest test/ \
            --ignore=test/test_ros_conversions.py \
            -v \
            --tb=short \
            --cov=vggt_slam_ros2 \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── ROS2 colcon build ──────────────────────────────────────────────────────
  colcon-build:
    name: colcon build (ROS2 Humble)
    runs-on: ubuntu-22.04
    # ROS2 Humble pre-installed — avoids ~2-3 min apt install via setup-ros
    container:
      image: ros:humble-ros-base-jammy
    steps:
      - uses: actions/checkout@v4

      # Cache CMake + rosidl build artifacts; key covers all files that affect
      # the generated output (srv interfaces, CMakeLists.txt, package manifests).
      # On cache hit, colcon skips codegen and runs in ~5 s instead of ~60 s.
      - name: Cache colcon build artifacts
        uses: actions/cache@v4
        with:
          path: /tmp/colcon_ws/build
          key: colcon-humble-${{ hashFiles('CMakeLists.txt', 'package.xml', 'setup.py', 'setup.cfg', 'srv/**') }}
          restore-keys: colcon-humble-

      - name: colcon build
        run: |
          source /opt/ros/humble/setup.bash
          mkdir -p /tmp/colcon_ws/src
          ln -sfn "$GITHUB_WORKSPACE" /tmp/colcon_ws/src/vggt_slam_ros2
          cd /tmp/colcon_ws
          colcon build \
            --packages-select vggt_slam_ros2 \
            --cmake-args -DCMAKE_BUILD_TYPE=Release \
            --symlink-install
        shell: bash

      - name: Verify install
        run: |
          source /opt/ros/humble/setup.bash
          source /tmp/colcon_ws/install/setup.bash
          python3 -c "import vggt_slam_ros2; print('Import OK')"
        shell: bash
