/**:
  ros__parameters:

    # ---------------------------------------------------------------
    # VGGT model
    # ---------------------------------------------------------------
    # HuggingFace model ID or local path to VGGT checkpoint.
    # Available options:
    #   facebook/VGGT-1B          (non-commercial, original)
    #   facebook/VGGT-1B-Commercial  (commercial-use checkpoint)
    checkpoint: "facebook/VGGT-1B"

    # Use bfloat16 precision (requires Ampere GPU, compute capability ≥ 8.0).
    # Falls back to float16 automatically on older hardware.
    use_bf16: true

    # ---------------------------------------------------------------
    # Sliding window
    # ---------------------------------------------------------------
    # Number of frames fed to VGGT per inference call.
    # Larger window → better multi-view context, but more GPU memory & latency.
    window_size: 16

    # Number of NEW frames needed to trigger the next inference window.
    # Overlap = window_size - window_stride  (shared frames between windows).
    # Smaller stride → more overlap → better scale consistency at window seams.
    window_stride: 8

    # ---------------------------------------------------------------
    # Keyframe selection
    # ---------------------------------------------------------------
    # Minimum mean optical-flow magnitude (pixels) to accept a new keyframe.
    # Lower = more keyframes (denser map, more compute).
    min_flow: 10.0

    # Minimum rotation between frames (degrees) to accept regardless of flow.
    min_rotation_deg: 2.0

    # Maximum number of raw frames to wait before forcing a keyframe.
    max_frames_between_kf: 30

    # ---------------------------------------------------------------
    # Point cloud filtering
    # ---------------------------------------------------------------
    # Percentile of VGGT confidence scores below which points are discarded.
    # 0 = keep everything, 50 = keep top 50% confident points.
    conf_threshold_pct: 20.0

    # Voxel grid downsampling leaf size (metres). 0 = disabled.
    voxel_size: 0.0

    # ---------------------------------------------------------------
    # TF / frame IDs
    # ---------------------------------------------------------------
    map_frame: "map"
    camera_frame: "camera"

    # ---------------------------------------------------------------
    # Publishing
    # ---------------------------------------------------------------
    # Whether to periodically publish the full accumulated point cloud.
    publish_full_map: true

    # Period (seconds) between full-map publishes.
    full_map_period: 5.0

    # ---------------------------------------------------------------
    # Stage 2 — Loop closure (optional)
    # ---------------------------------------------------------------
    # Set to true to enable DINOv2 image retrieval + GTSAM pose graph.
    # Requires 'transformers' and 'gtsam' Python packages.
    enable_loop_closure: false

    # Cosine similarity threshold for a loop candidate (0–1].
    # Higher = fewer false positives but lower recall.
    lc_similarity_threshold: 0.85

    # Minimum time gap (seconds) between query and matched frame.
    # Prevents matching temporally adjacent frames.
    lc_min_time_gap: 10.0

    # ---------------------------------------------------------------
    # Stage 4.2 — Nav2 occupancy grid
    # ---------------------------------------------------------------
    # Publish a 2-D OccupancyGrid on ~/map at the same rate as the
    # full point cloud. Nav2 costmap_2d can subscribe directly.
    publish_occ_grid: true

    # Grid cell size in metres. Smaller = higher resolution, larger message.
    occ_grid_resolution: 0.05

    # Height band (metres) used to select obstacle points.
    # Points outside [z_min, z_max] are ignored.
    occ_grid_z_min: 0.1
    occ_grid_z_max: 2.0

    # Minimum number of point-cloud hits in a cell to mark it as occupied.
    occ_grid_min_points: 2

    # ---------------------------------------------------------------
    # Stage 4.3 — Automatic parameter tuning
    # ---------------------------------------------------------------
    # If true, window_size and window_stride are auto-selected at
    # startup based on available GPU memory. Overrides the values above.
    auto_tune_params: false

    # GPU memory budget in GB. 0 = auto-detect via torch.cuda.mem_get_info().
    auto_tune_budget_gb: 0.0
